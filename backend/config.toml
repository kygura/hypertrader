# hyperagent configuration — edited by the in-app settings (s); hand edits are preserved on load.
[markets]
  visualized = ["BTC", "ETH", "SOL", "HYPE", "XPL", "ZEC", "DOGE", "SUI", "AVAX", "BNB"]
  tracked = ["BTC", "ETH", "SOL", "HYPE", "XPL", "ZEC"]

[timeframe]
  default = "1h"
  [timeframe.per_asset]
    BTC = "4h"

[reasoner]
  review_provider = "claude-harness"
  review_model = ""
  trigger_provider = "pi-harness"
  trigger_model = "gpt-5.6-luna"
  batch_provider = "pi-harness"
  batch_model = "gpt-5.6-luna"
  chat_provider = "deepseek"
  chat_model = "deepseek-chat"

[gate]
  ltf_timeframes = ["1m", "5m", "15m"]
  zscore_return = 3.0
  funding_abs = 0.0008
  oi_delta_abs = 0.04
  cvd_zscore = 3.0
  cooldown = "30m0s"
  position_always = true

[execution]
  mode = "autonomous"
  max_position_usd = 5000.0
  max_total_exposure_usd = 15000.0
  max_position_pct = 0.05
  max_total_exposure_pct = 0.15
  max_concurrent = 5
  daily_loss_kill_usd = 50.0
  max_price_deviation = 0.02
  post_stop_cooldown = "30m0s"

[telegram]
  enabled = false
  bot_token = ""
  chat_id = ""

[providers]
  [providers.anthropic]
    api_key = ""
    api_key_env = ""
    model = "claude-opus-4-8"
    base_url = "https://api.anthropic.com"
    models = ["claude-opus-4-8", "claude-sonnet-4-6", "claude-haiku-4-5-20251001"]
    kind = ""
  [providers.openai]
    api_key = ""
    api_key_env = ""
    model = "gpt-4o"
    base_url = "https://api.openai.com/v1"
    models = ["gpt-4o", "gpt-4o-mini"]
    kind = ""
  [providers.deepseek]
    api_key = ""
    api_key_env = ""
    model = "deepseek-chat"
    base_url = "https://api.deepseek.com/v1"
    models = ["deepseek-chat", "deepseek-reasoner"]
    kind = ""
  [providers.custom.claude-harness]
    api_key = ""
    api_key_env = ""
    model = ""
    kind = "harness-claude"
  [providers.custom.pi-harness]
    api_key = ""
    api_key_env = ""
    model = "gpt-5.6-luna"
    kind = "harness-pi"
    # base_url carries pi's --provider sub-backend for harness-pi (no HTTP endpoint
    # is used); blank defaults to openai-codex, the GPT-5.6 backend.
    base_url = "openai-codex"

[storage]
  dir = "./data"
  ring_size = 512
  history_bars = 120

[marketdata]
  csv_dir = "./data/csv"
  use_coingecko = true
  [marketdata.ids]
    HYPE = "hyperliquid"

[api]
  enabled = true
  addr = "127.0.0.1:8787"
  token = ""
  cors_origins = ["http://localhost:5173"]
